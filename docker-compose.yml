version: "3.9"

services:
  classifier:
    build:
      context: .
      dockerfile: Dockerfile
    image: glsclass-orchestrator:latest
    container_name: glsclass-orchestrator
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - hf_cache:/app/.cache/huggingface
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8000}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  hf_cache:
  db_data: